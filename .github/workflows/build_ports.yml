name: Build Ports

on:
  workflow_dispatch:
    inputs:
      port:
        description: "Which port to consider (all = every port in registry)"
        type: string
        required: false
        default: "all"
      force-build:
        description: "Force build (bypass SHA check, upload artifact only, no commit)"
        type: boolean
        required: false
        default: false
  schedule:
    - cron: '30 4 * * *'

permissions:
  contents: write

concurrency:
  group: build-ports
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5

      - name: Discover ports to build
        id: discover
        run: |
          set -euo pipefail

          SELECTED="${{ inputs.port }}"
          FORCE="${{ inputs.force-build }}"
          : "${SELECTED:=all}"
          : "${FORCE:=false}"

          if [[ "$SELECTED" == "all" ]]; then
            ids=$(jq -r '.ports | keys[]' buildtools/registry.json)
          else
            if ! jq -e --arg id "$SELECTED" '.ports[$id]' buildtools/registry.json > /dev/null; then
              echo "Port '$SELECTED' not found in buildtools/registry.json"; exit 1
            fi
            ids="$SELECTED"
          fi

          to_build=()
          while read -r id; do
            [[ -z "$id" ]] && continue
            repo=$(jq -r --arg id "$id" '.ports[$id].upstream_repo' buildtools/registry.json)
            # Two tracking modes:
            #   branch (default): resolve HEAD of upstream_branch to a SHA.
            #                     Right for ports without release tags (e.g.
            #                     Sonic Mania decomp which has rolling main).
            #   release:          resolve the latest published release tag to
            #                     its commit SHA. Right for projects with a
            #                     stable release cadence (e.g. sonic3air).
            track_mode=$(jq -r --arg id "$id" '.ports[$id].track // "branch"' buildtools/registry.json)

            # Scheduled runs only consider release-tagged ports. Branch-tracked
            # upstreams (rolling main, no release cadence — e.g. rsdkv3 nightlies)
            # would rebuild on every cron tick; manual workflow_dispatch is the
            # right trigger for those.
            if [[ "$GITHUB_EVENT_NAME" == "schedule" && "$track_mode" != "release" ]]; then
              echo "[$id] skipping in scheduled run (track=$track_mode; cron is release-only)"
              continue
            fi

            # A port can fan out to multiple target dirs (e.g. one build
            # produces both sonic.1 and sonic.2 payloads). Use the first as
            # the SHA marker source of truth; all targets stay in sync.
            first_target=$(jq -r --arg id "$id" '.ports[$id].target_dirs[0]' buildtools/registry.json)

            case "$track_mode" in
              release)
                tag=$(curl -sf "https://api.github.com/repos/$repo/releases/latest" | jq -r .tag_name)
                if [[ -z "$tag" || "$tag" == "null" ]]; then
                  echo "[$id] failed to resolve latest release on $repo — skipping"
                  continue
                fi
                # Resolve the tag to the commit SHA it points at. Annotated
                # tags require one extra hop via the tag object.
                ref=$(curl -sf "https://api.github.com/repos/$repo/git/ref/tags/$tag")
                ref_type=$(echo "$ref" | jq -r .object.type)
                if [[ "$ref_type" == "tag" ]]; then
                  tag_obj_url=$(echo "$ref" | jq -r .object.url)
                  upstream_sha=$(curl -sf "$tag_obj_url" | jq -r .object.sha)
                else
                  upstream_sha=$(echo "$ref" | jq -r .object.sha)
                fi
                source="$repo@$tag"
                # Human label for the commit message — tag name conveys
                # release version more clearly than a 7-char SHA.
                label="$tag"
                ;;
              branch|*)
                branch=$(jq -r --arg id "$id" '.ports[$id].upstream_branch' buildtools/registry.json)
                upstream_sha=$(curl -sf "https://api.github.com/repos/$repo/commits/$branch" | jq -r .sha)
                source="$repo@$branch"
                label="${upstream_sha:0:7}"
                ;;
            esac

            if [[ -z "$upstream_sha" || "$upstream_sha" == "null" ]]; then
              echo "[$id] failed to resolve upstream SHA on $source — skipping"
              continue
            fi

            marker="$first_target/.upstream-sha"
            if [[ -f "$marker" ]]; then
              origin_sha=$(cat "$marker")
            else
              origin_sha=""
            fi

            if [[ "$FORCE" == "true" ]] || [[ "$upstream_sha" != "$origin_sha" ]]; then
              echo "[$id] needs build (source=$source origin=${origin_sha:-none} upstream=$upstream_sha)"
              to_build+=("$id:$upstream_sha:$label")
            else
              echo "[$id] up to date at $upstream_sha — skipping"
            fi
          done <<< "$ids"

          {
            echo "to_build<<EOF"
            printf '%s\n' "${to_build[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build each port
        if: steps.discover.outputs.to_build != ''
        run: |
          set -uo pipefail

          FORCE="${{ inputs.force-build }}"
          : "${FORCE:=false}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Force-build collects artifacts here; uploaded at end as one bundle.
          FORCE_STAGING="$RUNNER_TEMP/force-build-outputs"
          [[ "$FORCE" == "true" ]] && mkdir -p "$FORCE_STAGING"

          failures=()

          while IFS=: read -r id upstream_sha label; do
            [[ -z "$id" ]] && continue
            short="${upstream_sha:0:7}"
            # Fallback for legacy two-field entries (no label).
            [[ -z "$label" ]] && label="$short"
            port_dir=$(jq -r --arg id "$id" '.ports[$id].port_dir' buildtools/registry.json)
            # target_dirs is a JSON array; mapfile into a bash array so one
            # build can fan out to multiple payload dirs (e.g. sonic.1/sonic.2
            # sharing the RSDKv4 build).
            mapfile -t target_dirs < <(jq -r --arg id "$id" '.ports[$id].target_dirs[]' buildtools/registry.json)
            commit_prefix=$(jq -r --arg id "$id" '.ports[$id].commit_prefix' buildtools/registry.json)
            artifacts=$(jq -r --arg id "$id" '.ports[$id].artifacts[]' buildtools/registry.json)

            echo "::group::[$id] build"
            # Invoke via `bash` so the script doesn't need the executable bit
            # — file-mode handling is inconsistent on Windows checkouts.
            # FORCE_HEAD tells tag-tracking build.txt recipes to build from
            # branch HEAD instead. Commit-tracking recipes (like rsdkv5,
            # which already follows HEAD) ignore this.
            if ! FORCE_HEAD="$FORCE" bash buildtools/build_port.sh "$port_dir"; then
              echo "::error::[$id] build_port.sh failed"
              failures+=("$id")
              echo "::endgroup::"
              continue
            fi
            echo "::endgroup::"

            if [[ "$FORCE" == "true" ]]; then
              echo "[$id] force-build: staging artifacts for upload, skipping commit"
              dest="$FORCE_STAGING/$id-$short"
              mkdir -p "$dest"
              shopt -s nullglob
              while read -r a; do
                [[ -z "$a" ]] && continue
                if [[ "$a" == *\** ]]; then
                  for f in $port_dir/$a; do
                    cp -r "$f" "$dest/"
                  done
                elif [[ -e "$port_dir/$a" ]]; then
                  cp -r "$port_dir/$a" "$dest/"
                fi
              done <<< "$artifacts"
              shopt -u nullglob
              continue
            fi

            # Before touching target_dirs, verify every required artifact was
            # produced. If any is missing, the build silently failed (e.g.
            # docker exec exit code swallowed by build_port.sh, or a step in
            # build.txt didn't fail-fast). Bailing here prevents committing a
            # stale .upstream-sha that would make the next run think we're
            # up-to-date when no binaries changed.
            #
            # Artifact entries containing '*' are treated as globs (useful for
            # multi-volume archives like data.7z.* where the part count can
            # vary between upstream versions). A glob is considered satisfied
            # if it matches at least one file.
            missing=()
            shopt -s nullglob
            while read -r a; do
              [[ -z "$a" ]] && continue
              if [[ "$a" == *\** ]]; then
                matches=($port_dir/$a)
                if (( ${#matches[@]} == 0 )); then
                  missing+=("$a")
                fi
              elif [[ ! -e "$port_dir/$a" ]]; then
                missing+=("$a")
              fi
            done <<< "$artifacts"
            shopt -u nullglob
            if (( ${#missing[@]} > 0 )); then
              echo "::error::[$id] build produced no output — missing artifacts: ${missing[*]}"
              failures+=("$id")
              continue
            fi

            echo "::group::[$id] sync payload to ${target_dirs[*]}"
            shopt -s nullglob
            for target_dir in "${target_dirs[@]}"; do
              mkdir -p "$target_dir"
              while read -r a; do
                [[ -z "$a" ]] && continue
                if [[ "$a" == *\** ]]; then
                  # Glob artifact: purge any existing matches in target_dir
                  # first so shrinking part counts (e.g. 3 parts → 2 parts)
                  # don't leave orphaned files behind.
                  for stale in $target_dir/$a; do
                    rm -rf "$stale"
                  done
                  for f in $port_dir/$a; do
                    cp -r "$f" "$target_dir/$(basename "$f")"
                  done
                else
                  # Path artifacts may include a subdirectory prefix (e.g.
                  # `doc/license.txt`), so ensure the parent dir exists.
                  mkdir -p "$target_dir/$(dirname "$a")"
                  if [[ -d "$port_dir/$a" ]]; then
                    rm -rf "$target_dir/$a"
                    cp -r "$port_dir/$a" "$target_dir/$a"
                  elif [[ -f "$port_dir/$a" ]]; then
                    cp "$port_dir/$a" "$target_dir/$a"
                  fi
                fi
              done <<< "$artifacts"
              echo "$upstream_sha" > "$target_dir/.upstream-sha"
            done
            shopt -u nullglob
            echo "::endgroup::"

            echo "::group::[$id] commit and push"
            for target_dir in "${target_dirs[@]}"; do
              git add "$target_dir"
            done
            if git diff --staged --quiet; then
              echo "[$id] no payload changes after sync — skipping commit"
              echo "::endgroup::"
              continue
            fi
            git commit -m "[$commit_prefix] Update to $label"

            # Retry fetch+rebase+push to absorb concurrent pushes from other
            # workflows hitting the same branch (e.g. collect_ports.yml) and
            # from other ports in this same run between commits.
            pushed=false
            for attempt in 1 2 3 4 5; do
              git fetch origin "$GITHUB_REF_NAME"
              if ! git rebase "origin/$GITHUB_REF_NAME"; then
                echo "::error::[$id] rebase failed on attempt $attempt"
                git rebase --abort || true
                break
              fi
              if git push origin "HEAD:$GITHUB_REF_NAME"; then
                echo "[$id] pushed on attempt $attempt"
                pushed=true
                break
              fi
              echo "[$id] push rejected on attempt $attempt; retrying..."
              sleep $((attempt * 3))
            done

            if ! $pushed; then
              echo "::error::[$id] failed to push after 5 attempts"
              failures+=("$id")
            fi
            echo "::endgroup::"
          done <<< "${{ steps.discover.outputs.to_build }}"

          if (( ${#failures[@]} > 0 )); then
            echo "::error::Failures: ${failures[*]}"
            exit 1
          fi

      - name: Upload force-build artifacts
        if: inputs.force-build == true
        uses: actions/upload-artifact@v5
        with:
          name: force-build-outputs
          path: ${{ runner.temp }}/force-build-outputs
          retention-days: 14
          if-no-files-found: ignore
