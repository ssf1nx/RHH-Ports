name: Update HM64 Port
on:
  repository_dispatch:
    types: [hm64_update]

permissions:
  contents: write

jobs:
  sync-port:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and Overwrite
        run: |
          ZIP_URL="${{ github.event.client_payload.zip_url }}"
          ZIP_FILE=$(basename "$ZIP_URL")
          PORT_NAME="${ZIP_FILE%.*}"
          BASE_DIR="ports/released/harbourmasters64"
          TARGET_DIR="$BASE_DIR/$PORT_NAME"
          
          mkdir -p "$TARGET_DIR"
          
          # Download the asset
          curl -L -o "$ZIP_FILE" "$ZIP_URL"
          
          # Extract everything to ensure no files are missed
          unzip -o "$ZIP_FILE" -d "$TARGET_DIR"
          
          # Use find to locate and remove any folder named 'src' 
          # This handles the nested structure (sm64-ghostship/sm64-ghostship/src) perfectly
          find "$TARGET_DIR" -type d -name "src" -exec rm -rf {} +
          
          # Cleanup the downloaded zip
          rm "$ZIP_FILE"
          
          echo "PORT_NAME=$PORT_NAME" >> $GITHUB_ENV

      - name: Commit Changes
        run: |
          RAW_NAME="${{ env.PORT_NAME }}"
          UPPER_NAME="${RAW_NAME^^}"
          VER="${{ github.event.client_payload.version }}"
          
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[$UPPER_NAME] Update to $VER"
            git push
          fi