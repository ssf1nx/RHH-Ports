name: Update HM64 Port
on:
  repository_dispatch:
    types: [hm64_update]

permissions:
  contents: write

jobs:
  sync-port:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and Sync
        run: |
          set -euo pipefail

          ZIP_URL="${{ github.event.client_payload.zip_url }}"
          VERSION="${{ github.event.client_payload.version }}"
          PORT_NAME=$(basename "$ZIP_URL" .zip)
          TARGET_DIR="ports/released/harbourmasters64/$PORT_NAME"

          mkdir -p "$TARGET_DIR"

          curl -L -o temp.zip "$ZIP_URL"
          
          unzip -o temp.zip -d "$TARGET_DIR"
          
          find "$TARGET_DIR" -type d -name "src" -exec rm -rf {} +
          find "$TARGET_DIR" -path "*/tools/.gitkeep" -delete
          rm temp.zip

          echo "UPPER_NAME=${PORT_NAME^^}" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[$UPPER_NAME] Update to $VERSION"
            git push
          fi