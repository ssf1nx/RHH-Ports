name: Release Ports

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force update all ports'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
  push:
    paths:
      - 'ports/released/**'

concurrency:
  group: release-ports
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y zip jq gh

      - name: Prepare environment
        run: |
          mkdir -p "$GITHUB_WORKSPACE/temp_ports"
          [ -f "$GITHUB_WORKSPACE/docs/ports.json" ] || echo "[]" > "$GITHUB_WORKSPACE/docs/ports.json"

      - name: Determine ports to process
        id: ports
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            mapfile -t PORTS < <(find ports/released -type f -name "*.sh" -exec dirname {} \;)
          else
            mapfile -t CHANGED < <(git diff --name-only HEAD^ HEAD)
            PORTS=()
            for f in "${CHANGED[@]}"; do
              if [[ "$f" == ports/released/* ]]; then
                PORTS+=("$(dirname "$f")")
              fi
            done
          fi

          mapfile -t PORTS < <(printf "%s\n" "${PORTS[@]}" | sort -u)
          echo "Ports=${PORTS[*]}" >> $GITHUB_OUTPUT
          echo "Found ${#PORTS[@]} changed paths."

      - name: Process ports
        if: ${{ steps.ports.outputs.Ports != '' }}
        run: |
          ZIP_DIR="$GITHUB_WORKSPACE/temp_ports"
          PORTS_JSON="$GITHUB_WORKSPACE/docs/ports.json"

          for CHANGED_PATH in ${{ steps.ports.outputs.Ports }}; do
            echo "→ Searching from $CHANGED_PATH"

            SEARCH_DIR="$CHANGED_PATH"
            PORT_JSON=""
            while [ "$SEARCH_DIR" != "$GITHUB_WORKSPACE" ]; do
              if [ -f "$SEARCH_DIR/port.json" ]; then
                PORT_JSON="$SEARCH_DIR/port.json"
                break
              fi
              if [[ "$SEARCH_DIR" == *"ports/released" ]]; then
                break
              fi
              SEARCH_DIR=$(dirname "$SEARCH_DIR")
            done

            if [ -z "$PORT_JSON" ]; then
              echo "  Skipping $CHANGED_PATH: no port.json found (searched upward)"
              continue
            fi

            # The staging dir is the directory *above* the one containing port.json
            PORT_JSON_DIR=$(dirname "$PORT_JSON")
            STAGING_DIR=$(dirname "$PORT_JSON_DIR")
            PORTNAME=$(basename "$STAGING_DIR")

            echo "  ✅ Found port.json in: $PORT_JSON_DIR"
            echo "  📦 Staging directory: $STAGING_DIR"
            echo "  📄 Port name: $PORTNAME"

            ZIP_PATH="$ZIP_DIR/${PORTNAME}.zip"
            echo "  Zipping → $ZIP_PATH"
            (cd "$STAGING_DIR" && zip -r -q "$ZIP_PATH" .)

            SCREENSHOT=$(find "$PORT_JSON_DIR" -maxdepth 1 -type f \( -iname "screenshot*.png" -o -iname "screenshot*.jpg" -o -iname "screenshot*.jpeg" \) | head -n1)
            [ -f "$SCREENSHOT" ] || { echo "  Skipping $PORTNAME: no screenshot found"; continue; }
            README=$(find "$PORT_JSON_DIR" -maxdepth 1 -type f \( -iname "README.md" -o -iname "readme.md" \) | head -n1)

            MD5=$(md5sum "$ZIP_PATH" | awk '{print $1}')
            SIZE=$(stat -c %s "$ZIP_PATH")
            DATE_UPDATED=$(date -u +"%Y-%m-%d")
            SCREENSHOT_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/${SCREENSHOT#"$GITHUB_WORKSPACE/"}"
            README_URL=""
            [ -f "$README" ] && README_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/${README#"$GITHUB_WORKSPACE/"}"
            DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/ports-latest/${PORTNAME}.zip"

            ORIGINAL_JSON=$(cat "$PORT_JSON")
            EXISTING_ENTRY=$(jq -c --arg name "$PORTNAME" '.[] | select((.name | split(".")[0]) == $name)' "$PORTS_JSON" || echo "")
            if [ -n "$EXISTING_ENTRY" ]; then
              OLD_MD5=$(echo "$EXISTING_ENTRY" | jq -r '.source.md5 // empty')
              OLD_SIZE=$(echo "$EXISTING_ENTRY" | jq -r '.source.size // empty')
            else
              OLD_MD5=""
              OLD_SIZE=""
            fi

            if [ "$MD5" != "$OLD_MD5" ] || [ "$SIZE" != "$OLD_SIZE" ]; then
              DATE_UPDATED=$(date -u +"%Y-%m-%d")
            else
              DATE_UPDATED=$(echo "$EXISTING_ENTRY" | jq -r '.source.date_updated // empty')
              [ -z "$DATE_UPDATED" ] && DATE_UPDATED=$(date -u +"%Y-%m-%d")
            fi

            PORT_JSON_MERGED=$(jq -n \
              --argjson original "$ORIGINAL_JSON" \
              --arg date_updated "$DATE_UPDATED" \
              --arg download_url "$DOWNLOAD_URL" \
              --arg readme_url "$README_URL" \
              --arg screenshot_url "$SCREENSHOT_URL" \
              --arg size "$SIZE" \
              --arg md5 "$MD5" \
              '$original + {source: {date_updated: $date_updated, download_url: $download_url, screenshot_url: $screenshot_url, readme_url: $readme_url, size: ($size|tonumber), md5: $md5}}'
            )

            TMP=$(mktemp)
            jq --arg portname "${PORTNAME}.zip" --argjson portjson "$PORT_JSON_MERGED" \
              'map(select(.name != $portname)) + [$portjson]' \
              "$PORTS_JSON" > "$TMP" && mv "$TMP" "$PORTS_JSON"
          done

      - name: Sort ports by title
        run: |
          jq 'sort_by(.attr.title)' "$GITHUB_WORKSPACE/docs/ports.json" > "$GITHUB_WORKSPACE/docs/ports.tmp" &&
          mv "$GITHUB_WORKSPACE/docs/ports.tmp" "$GITHUB_WORKSPACE/docs/ports.json"

      - name: Ensure release exists
        if: ${{ steps.ports.outputs.Ports != '' }}
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
        run: |
          gh release view ports-latest --json id &>/dev/null || \
          gh release create ports-latest --title "Ports" --notes "Automated release"

      - name: Delete conflicting assets
        if: ${{ steps.ports.outputs.Ports != '' }}
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
        run: |
          RELEASE_ID=$(gh api repos/${GITHUB_REPOSITORY}/releases/tags/ports-latest --jq '.id' || echo "")
          [ -z "$RELEASE_ID" ] && { echo "No release found, skipping asset deletion"; exit 0; }
          for FILE in temp_ports/*.zip; do
            NAME=$(basename "$FILE")
            ASSET_ID=$(gh api repos/${GITHUB_REPOSITORY}/releases/$RELEASE_ID/assets --jq ".[] | select(.name==\"$NAME\") | .id")
            if [ -n "$ASSET_ID" ]; then
              echo "Deleting old asset $NAME"
              gh api -X DELETE repos/${GITHUB_REPOSITORY}/releases/assets/$ASSET_ID
              sleep 5
            fi
          done

      - name: Upload zips with retries
        if: ${{ steps.ports.outputs.Ports != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
        run: |
          MAX_RETRIES=3
          for FILE in temp_ports/*.zip; do
            NAME=$(basename "$FILE")
            ATTEMPT=1
            until [ $ATTEMPT -gt $MAX_RETRIES ]; do
              echo "Uploading $NAME (attempt $ATTEMPT)..."
              gh release upload ports-latest "$FILE" --clobber && break
              echo "Failed to upload $NAME, retrying in 5s..."
              sleep 5
              ATTEMPT=$((ATTEMPT+1))
            done
          done

      - name: Commit ports.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add docs/ports.json
          if ! git diff --cached --quiet; then
            git commit -m "Update ports.json"
            git push
          fi

      - name: Cleanup
        if: always()
        run: rm -rf temp_ports