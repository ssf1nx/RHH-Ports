<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Work With Me — Jeod's Retro Handheld Ports</title>
	<link
		rel="stylesheet"
		href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
	/>
	<link rel="stylesheet" href="style.css" />
	<script src="https://cdn.jsdelivr.net/npm/marked@14.1.4/marked.min.js" defer></script>
	<style>
		/* Standalone content page — reuses the devlog prose styling. */
		.content-page {
			max-width: 820px;
			margin: 0 auto 3rem;
			background: var(--white);
			border: 1px solid rgba(0, 0, 0, 0.15);
			border-radius: var(--radius);
			box-shadow: var(--shadow-md);
			padding: 2rem 2.25rem;
		}
		.content-page .back-link {
			display: inline-flex;
			align-items: center;
			gap: 0.5rem;
			margin-bottom: 1.25rem;
			font-weight: 600;
			text-decoration: none;
			color: var(--primary);
		}
		.content-page .back-link:hover,
		.content-page .back-link:focus-visible {
			color: var(--primary-hover);
		}
		.content-page h1 {
			margin-top: 0;
		}
		.content-page h2,
		.content-page h3 {
			margin-top: 1.6rem;
		}
		.content-page a {
			color: var(--primary);
		}
		.content-page ul {
			padding-left: 1.25rem;
		}
		.content-page li {
			margin-bottom: 0.5rem;
		}
	</style>
</head>
<body>
	<header class="site-header">
		<h1>Jeod's Retro Handheld Ports</h1>

		<div class="avatar">
			<a href="https://github.com/JeodC" target="_blank" rel="noopener noreferrer">
				<img src="jeod.png" alt="Jeod's GitHub profile" />
			</a>
		</div>
	</header>

	<main>
		<article class="content-page">
			<a class="back-link" href="index.html"><i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Back to ports</a>
			<div id="content">Loading…</div>
		</article>
	</main>

	<script>
		(async () => {
			const target = document.getElementById('content');
			try {
				const res = await fetch('work-with-me.md', { cache: 'no-cache' });
				if (!res.ok) throw new Error('fetch failed');
				const md = await res.text();
				target.innerHTML = (typeof marked !== 'undefined')
					? marked.parse(md, { gfm: true, breaks: true })
					: md;
			} catch (e) {
				target.innerHTML = '<p>Content unavailable.</p>';
			}
		})();
	</script>
</body>
</html>
